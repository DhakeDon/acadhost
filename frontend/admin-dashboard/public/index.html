<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="theme-color" content="#1a237e" />

  <meta name="description" content="AcadHost Admin Dashboard" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <title>AcadHost Admin</title>

  <script>
    // Apply theme before React mounts to prevent flash of wrong theme
    // Must match src/context/ThemeContext.jsx

    (function () {
      try {
        var saved = localStorage.getItem('acadhost-theme');

        var prefersDark =
                window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: dark)').matches;

        var useDark = saved
                ? saved === 'dark'
                : prefersDark;

        document.documentElement.setAttribute(
                'data-theme',
                useDark ? 'dark' : 'light'
        );

      } catch (e) {

        // Fallback if localStorage blocked
        document.documentElement.setAttribute(
                'data-theme',
                'light'
        );
      }
    })();
  </script>

</head>

<body>
<noscript>
  You need to enable JavaScript to run this app.
</noscript>

<div id="root"></div>
</body>
</html>
